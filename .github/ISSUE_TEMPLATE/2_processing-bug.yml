name: Processing Bug
id: processing-bug
description: Report a defect in ingestion, classification, routing, or dashboard behaviour.
title: "[Processing Bug]: "
labels:
  - bug
body:
  - type: input
    id: subsystem
    attributes:
      label: Subsystem
      placeholder: ingestion-worker, api-gateway, math-engine, web-dashboard
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
