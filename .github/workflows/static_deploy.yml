name: Deploy Static Hub & Model Artifacts to Pages

# The dashboard is served from https://<owner>.github.io/UAP/. The Pages
# source must be set to "GitHub Actions" in the repository settings; this
# workflow then uploads a build artifact and deploys it through the
# official `actions/deploy-pages` action.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /UAP
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/web-dashboard/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/math-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/math-engine/Cargo.toml') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Compile Rust Math Engine to WASM
        working-directory: services/math-engine
        run: wasm-pack build --target web --out-dir pkg

      - name: Build Static Web Dashboard
        working-directory: services/web-dashboard
        run: |
          npm ci
          npm run build

      - name: Inject Advanced Security Headers
        run: |
          cat > services/web-dashboard/out/_headers <<'HEADERS'
          /*.html
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp

          /*.wasm
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          HEADERS

      - name: Prepare Deployment Artifact
        run: |
          rm -rf gh-pages-root
          mkdir -p gh-pages-root/wasm-engine gh-pages-root/schemas
          cp -R services/web-dashboard/out/. gh-pages-root/
          cp -R services/math-engine/pkg/. gh-pages-root/wasm-engine/
          cp -R data-schemas/. gh-pages-root/schemas/
          # Disable Jekyll processing so files/directories beginning with
          # "_" (e.g. _next) are served verbatim.
          touch gh-pages-root/.nojekyll
          # Provide a top-level 404 fallback for direct deep-link requests.
          if [ ! -f gh-pages-root/404.html ] && [ -f gh-pages-root/index.html ]; then
            cp gh-pages-root/index.html gh-pages-root/404.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages-root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
